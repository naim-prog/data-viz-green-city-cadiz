<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Cádiz - Vegetación</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="m-0 bg-slate-50 text-slate-800 overflow-hidden">

    <div class="flex h-screen w-full overflow-hidden">
        
        <div class="flex-1 relative h-full z-10">
            <button id="btn-toggle" class="absolute top-5 right-5 z-[1000] bg-white text-slate-700 p-3 rounded-lg shadow-lg border border-slate-200 hover:bg-slate-50 hover:text-emerald-600 transition-all duration-300 flex items-center justify-center focus:outline-none">
                <svg id="icono-menu" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
            </button>
            <div id="mapa-cadiz" class="w-full h-full"></div>
        </div>

        <div id="sidebar" class="bg-white shadow-2xl transition-all duration-300 ease-in-out w-0 flex flex-col z-20 overflow-hidden">
            <div class="p-6 bg-emerald-800 text-white flex-shrink-0">
                <h2 class="text-xl font-bold flex items-center gap-2 whitespace-nowrap">
                    <span>🌿</span> Ranking Vegetación
                </h2>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4">
                <table class="w-full text-left" id="tabla-vegetacion">
                    <thead class="sticky top-0 bg-white z-10 shadow-sm">
                        <tr class="whitespace-nowrap">
                            <th class="pb-3 pt-1 font-bold text-slate-600 border-b-2 border-slate-200">Municipio</th>
                            <th class="pb-3 pt-1 font-bold text-slate-600 border-b-2 border-slate-200 text-right">Valor</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
