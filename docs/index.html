<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Cádiz - Vegetación</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mapa-cadiz"></div>
    
    <button id="btn-tabla" title="Ver ranking de vegetación">📊</button>
    
    <div id="modal-tabla" class="oculto">
        <div class="contenido-modal">
            <div class="cabecera-modal">
                <h2>Ranking de Vegetación por Municipio</h2>
                <button id="btn-cerrar">&times;</button>
            </div>
            <div class="cuerpo-modal">
                <table id="tabla-vegetacion">
                    <thead>
                        <tr>
                            <th>Municipio</th>
                            <th>Vegetación (%)</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
